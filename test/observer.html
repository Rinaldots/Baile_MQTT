<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Observer</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  video, canvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
  }
  canvas { pointer-events: none; }
  #overlay {
    position: fixed; top: 8px; left: 8px; z-index: 10;
    color: #0f0; font: 13px/1.4 monospace;
    background: rgba(0, 0, 0, 0.75);
    padding: 8px 10px; border-radius: 6px;
    max-width: calc(100vw - 32px);
  }
  #overlay .line { margin: 2px 0; }
  #overlay .ok   { color: #0f0; }
  #overlay .wait { color: #fc0; }
  #overlay .err  { color: #f55; }
  #controls {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px;
  }
  #controls button {
    padding: 12px 20px; border: none; border-radius: 8px;
    font: bold 14px monospace; cursor: pointer;
  }
  #btnMap  { background: #fc0; color: #000; }
  #btnStop { background: #0f0; color: #000; display: none; }
  #btnReset{ background: #f55; color: #fff; }
</style>
</head>
<body>
<video  id="v" autoplay playsinline muted></video>
<canvas id="c"></canvas>
<div id="controls">
  <button id="btnMap"  onclick="startMapping()">Iniciar Mapeamento</button>
  <button id="btnStop" onclick="stopMapping()">Finalizar Mapeamento</button>
  <button id="btnReset"onclick="resetSlam()">Reset</button>
</div>
<div id="overlay">
  <div class="line" id="st">Iniciando...</div>
  <div class="line" id="cal">Calibracao: aguardando BA...</div>
  <div class="line" id="det"></div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
// --- Config --------------------------------------------------------------
let CAM_ID = new URLSearchParams(location.search).get('cam');
if (!CAM_ID) {
  CAM_ID = localStorage.getItem('cam_id');
  if (!CAM_ID) {
    CAM_ID = Math.floor(Math.random() * 10000).toString();
    localStorage.setItem('cam_id', CAM_ID);
  }
}

const MQTT_URL  = 'ws://10.0.0.134:9001';
const WS_URL    = `wss://${location.hostname}:8765`;
const SEND_W    = 640;
const SEND_H    = 360;
const SEND_FPS  = 10;  // frames enviados ao servidor por segundo

let H       = null;
let lastDet = null;
let ws      = null;

// --- MQTT (so para receber calibracao) -----------------------------------
const mqttClient = mqtt.connect(MQTT_URL, {
  clientId: `obs_${CAM_ID}_${Date.now()}`,
  reconnectPeriod: 2000,
});

mqttClient.on('connect', () => {
  setStatus(`cam${CAM_ID} conectada`, 'ok');
  mqttClient.subscribe(`cam/calibration/${CAM_ID}`);
});

mqttClient.on('error', e => setStatus(`MQTT erro: ${e.message}`, 'err'));

mqttClient.on('message', (topic, msg) => {
  if (topic !== `cam/calibration/${CAM_ID}`) return;
  try {
    const d = JSON.parse(msg.toString());
    if (!d.H || d.H.length !== 9) return;
    H = reshape(d.H);
    const rmse = d.rmse != null ? d.rmse.toFixed(1) : '?';
    setCal(`Calibracao BA ativa (RMSE=${rmse}cm)`, 'ok');
  } catch (e) {
    setCal(`Erro calibracao: ${e.message}`, 'err');
  }
});

// --- WebSocket para o servidor de inferencia -----------------------------
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => setStatus(`cam${CAM_ID} — conectado`, 'ok');
  ws.onclose = () => {
    setStatus('Servidor desconectado, reconectando...', 'wait');
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => setStatus('Erro WebSocket', 'err');

  ws.onmessage = e => {
    const data = JSON.parse(e.data);

    // Mensagens de estado do SLAM
    if (data.status) {
      if (data.status === 'mapping') {
        setStatus(`Mapeando... ${data.frames}/${data.target || '?'} frames`, 'wait');
        document.getElementById('btnMap').style.display  = 'none';
        document.getElementById('btnStop').style.display = 'inline-block';
      } else if (data.status === 'processing') {
        setStatus(`MASt3R processando ${data.frames} frames...`, 'wait');
        document.getElementById('btnStop').style.display = 'none';
      } else if (data.status === 'tracking') {
        setStatus(`Tracking ativo (${data.landmarks} landmarks)`, 'ok');
        document.getElementById('btnMap').style.display  = 'inline-block';
      } else if (data.status === 'idle') {
        setStatus('Pronto para mapear', 'wait');
        document.getElementById('btnMap').style.display  = 'inline-block';
        document.getElementById('btnStop').style.display = 'none';
      } else if (data.status === 'error') {
        setStatus(`Erro: ${data.msg}`, 'err');
        document.getElementById('btnMap').style.display  = 'inline-block';
        document.getElementById('btnStop').style.display = 'none';
      }
      return;
    }

    // Frame com deteccoes
    if (!data.detections || data.detections.length === 0) {
      lastDet = null;
      return;
    }
    // Converte bbox_send -> coordenadas do canvas (full-res)
    const sx = video.videoWidth  / SEND_W;
    const sy = video.videoHeight / SEND_H;
    lastDet = data.detections.map(d => {
      const [x1, y1, x2, y2] = d.bbox_send;
      return {
        cx:    (x1 + x2) / 2 * sx,
        cy:    (y1 + y2) / 2 * sy,
        w:     (x2 - x1) * sx,
        h:     (y2 - y1) * sy,
        score: d.score,
        world: d.world || null,
      };
    });
  };
}

// --- Camera --------------------------------------------------------------
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx   = canvas.getContext('2d');

navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: 'environment',
    width:  { ideal: 1280 },
    height: { ideal: 720 },
    frameRate: { ideal: 60 },
  }
}).then(stream => {
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    connectWS();
    setInterval(sendFrame, 1000 / SEND_FPS);
    requestAnimationFrame(loop);
  };
}).catch(err => setStatus(`Camera: ${err.message}`, 'err'));

// --- Envio de frames -----------------------------------------------------
const prepCanvas = document.createElement('canvas');
prepCanvas.width  = SEND_W;
prepCanvas.height = SEND_H;
const prepCtx = prepCanvas.getContext('2d');

function sendFrame() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  prepCtx.drawImage(video, 0, 0, SEND_W, SEND_H);
  const b64 = prepCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  ws.send(JSON.stringify({
    cam    : CAM_ID,
    img    : b64,
    video_w: video.videoWidth,
    video_h: video.videoHeight,
  }));
}

// --- Loop de render ------------------------------------------------------
function loop() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  if (lastDet && lastDet.length > 0) {
    lastDet.forEach((det, i) => drawDetection(det, i));
    updateDetInfo(lastDet);
  } else {
    document.getElementById('det').textContent = '';
  }
  requestAnimationFrame(loop);
}

// --- Homografia ----------------------------------------------------------
function applyH(H, u, v) {
  const w = H[2][0] * u + H[2][1] * v + H[2][2];
  return {
    x: (H[0][0] * u + H[0][1] * v + H[0][2]) / w,
    y: (H[1][0] * u + H[1][1] * v + H[1][2]) / w,
  };
}

function reshape(flat) {
  return [
    [flat[0], flat[1], flat[2]],
    [flat[3], flat[4], flat[5]],
    [flat[6], flat[7], flat[8]],
  ];
}

// --- UI ------------------------------------------------------------------
const COLORS = ['#0f0', '#0ff', '#ff0', '#f80'];

function drawDetection(det, idx) {
  const color = COLORS[idx % COLORS.length];
  const x = det.cx - det.w / 2;
  const y = det.cy - det.h / 2;

  ctx.lineWidth   = 3;
  ctx.strokeStyle = color;
  ctx.strokeRect(x, y, det.w, det.h);

  // Label com ID
  ctx.fillStyle = color;
  ctx.font      = 'bold 14px monospace';
  ctx.fillText(`R${idx}`, x + 4, y - 4);

  ctx.beginPath();
  ctx.arc(det.cx, det.cy, 5, 0, 2 * Math.PI);
  ctx.fill();
}

function updateDetInfo(dets) {
  const lines = dets.map((d, i) => {
    const conf = (d.score * 100).toFixed(0);
    if (d.world) {
      return `R${i}: (${d.world.x.toFixed(0)}, ${d.world.y.toFixed(0)}, ${d.world.z.toFixed(0)}) cm  ${conf}%`;
    }
    return `R${i}: px(${d.cx.toFixed(0)}, ${d.cy.toFixed(0)})  ${conf}%`;
  });
  document.getElementById('det').textContent = lines.join(' | ');
}

function setStatus(msg, cls) {
  const el = document.getElementById('st');
  el.textContent = msg;
  el.className = 'line ' + (cls || '');
}

// --- Controles SLAM -------------------------------------------------------
function startMapping() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ cmd: 'start_mapping' }));
}

function stopMapping() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ cmd: 'stop_mapping' }));
}

function resetSlam() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ cmd: 'reset' }));
  lastDet = null;
  document.getElementById('btnMap').style.display  = 'inline-block';
  document.getElementById('btnStop').style.display = 'none';
}

function setCal(msg, cls) {
  const el = document.getElementById('cal');
  el.textContent = msg;
  el.className = 'line ' + (cls || '');
}
</script>
</body>
</html>
